# ─────────────────────────────────────────────────────────────────────────────
#  Contribution Snake — generates snake.svg + snake-dark.svg every 12 hours.
#  Output branch: `output`. README references via raw.githubusercontent URLs.
#  Drop at:  .github/workflows/snake.yml
# ─────────────────────────────────────────────────────────────────────────────
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"   # twice daily
  workflow_dispatch:         # manual trigger button in the Actions tab
  push:
    branches: [ master, main ]

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: harshagv
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
            dist/snake-phosphor.svg?color_snake=%2352FFAA&color_dots=%231B2A23,%23B6F5D4,%237FDCFF,%2352FFAA,%23E8FFE8

      - name: Push to `output` branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
